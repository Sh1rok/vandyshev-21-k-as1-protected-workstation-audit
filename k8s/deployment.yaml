apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-deployment
  namespace: vandyshev-audit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      containers:
      - name: audit
        image: seelebz/protected-workstation-audit-service:v1
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000